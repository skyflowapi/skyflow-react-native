name: CI pipeline for main branch

on:
  push:
    branches:
      - main

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 14.21.3

      - name: install node_modules
        # --ignore-scripts: guard against supply-chain postinstall execution.
        # example/postinstall (patch-package) is not triggered here (root install only).
        # react-native native postinstall not required — CI runs JS tests/build only.
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build