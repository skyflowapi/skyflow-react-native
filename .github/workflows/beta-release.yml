name: Public Beta Release

on:
  push:
    tags: '*.*.*-beta.*'
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'
      - '*.md'
      
jobs:
  build-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v1
        with:
          node-version: 14.21.3
          registry-url: 'https://registry.npmjs.org'
      # --ignore-scripts: guard against supply-chain postinstall execution.
      # example/postinstall (patch-package) is not triggered here (root install only).
      # react-native native postinstall not required — CI runs JS tests/build only.
      - run: npm install --ignore-scripts

      - name: Build
        run: npm run build

      - name: publish to npm
        run: npm publish --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}